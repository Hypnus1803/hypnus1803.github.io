<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            box-sizing: border-box;
            text-align: center;
            background: #171512;
            color: #f3ece0;
            font-family: Georgia, "Times New Roman", serif;
        }

        .not-found {
            max-width: 640px;
        }

        .not-found h1 {
            margin-bottom: 0.75rem;
            font-size: clamp(2.2rem, 6vw, 3.5rem);
        }

        .not-found p {
            margin-bottom: 1.5rem;
            font-size: 1.05rem;
            line-height: 1.6;
        }

        .not-found a {
            color: #f4c78d;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <main class="not-found">
        <h1>404 - Page Not Found</h1>
        <p>The root address of this GitHub Pages site is intentionally unavailable.</p>
        <!--<p>You can enter the website from <a href="/JoseIvan/">hypnus1803.github.io/JoseIvan</a>.</p>-->
    </main>
</body>
</html>
